<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>EchoScript — Transcripts</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 20px; background: #fafafa; color: #222; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
    .toolbar input[type=text] { flex: 1; min-width: 220px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { color: #fff; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 13px; }
    #refresh { background: #607d8b; }
    #exportAll { background: #2196f3; }
    #clearAll { background: #f44336; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 14px; margin-bottom: 12px; }
    .card h2 { font-size: 15px; margin: 0 0 4px; }
    .meta { font-size: 11px; color: #999; margin-bottom: 8px; word-break: break-all; }
    .card .text { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
    .card .actions { margin-top: 10px; display: flex; gap: 6px; }
    .card .actions button { padding: 5px 10px; font-size: 12px; }
    .exp { background: #2196f3; }
    .del { background: #f44336; }
    .empty { color: #888; }
    .count { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h1>EchoScript Transcripts <span id="count" class="count"></span></h1>
  <div class="toolbar">
    <input id="search" type="text" placeholder="Search title, transcript, or URL…">
    <button id="refresh">Refresh</button>
    <button id="exportAll">Export all</button>
    <button id="clearAll">Clear all</button>
  </div>
  <div id="list"></div>
  <script src="manage.js"></script>
</body>
</html>
